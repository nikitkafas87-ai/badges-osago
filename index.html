async function decrypt(){
  const pw=document.getElementById('pw').value;
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  let key;
  try{
    key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:Uint8Array.from(atob(SALT),c=>c.charCodeAt(0)),iterations:100000,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
  }catch(e){showErr();return}
  try{
    const raw=Uint8Array.from(atob(CT),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(IV),c=>c.charCodeAt(0));
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,raw);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){showErr()}
}
function showErr(){document.getElementById('err').style.display='block'}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')decrypt()});
</script>
